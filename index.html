<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pickleball Randomizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0fdf4;
      color: #1a2e1a;
      min-height: 100vh;
    }

    header {
      background: #16a34a;
      color: white;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header span { font-size: 1.8rem; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 640px) {
      .container { grid-template-columns: 1fr; }
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #15803d;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Settings */
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .setting-row label { font-size: 0.9rem; color: #444; }
    .setting-row input[type="number"] {
      width: 70px;
      padding: 6px 10px;
      border: 1.5px solid #d1fae5;
      border-radius: 8px;
      font-size: 0.9rem;
      text-align: center;
      background: #f0fdf4;
      outline: none;
    }
    .setting-row input[type="number"]:focus { border-color: #16a34a; }

    /* Players */
    .player-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .player-input-row input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid #d1fae5;
      border-radius: 8px;
      font-size: 0.9rem;
      background: #f0fdf4;
      outline: none;
    }
    .player-input-row input[type="text"]:focus { border-color: #16a34a; }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-green { background: #16a34a; color: white; }
    .btn-red { background: #ef4444; color: white; padding: 4px 10px; font-size: 0.75rem; }
    .btn-gray { background: #e5e7eb; color: #374151; }
    .btn-yellow { background: #f59e0b; color: white; }

    #player-list {
      list-style: none;
      max-height: 260px;
      overflow-y: auto;
    }
    #player-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 4px;
      background: #f0fdf4;
      border: 1px solid #d1fae5;
    }
    .player-count {
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .player-count span { font-weight: 600; color: #15803d; }

    /* Action bar */
    .action-bar {
      grid-column: 1 / -1;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .action-bar .btn { padding: 12px 28px; font-size: 1rem; border-radius: 10px; }

    /* Results */
    .results-section {
      grid-column: 1 / -1;
    }

    #results-container {
      display: none;
    }

    .game-block {
      margin-bottom: 20px;
    }
    .game-block h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #15803d;
      margin-bottom: 10px;
      border-bottom: 2px solid #d1fae5;
      padding-bottom: 6px;
    }
    .courts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .court-card {
      background: white;
      border-radius: 10px;
      border: 2px solid #d1fae5;
      overflow: hidden;
    }
    .court-card .court-title {
      background: #dcfce7;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #15803d;
      text-align: center;
    }
    .team {
      padding: 8px 12px;
    }
    .team:first-of-type { border-bottom: 1px dashed #d1fae5; }
    .team-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .team-players { font-size: 0.88rem; }
    .team-players div { padding: 2px 0; }

    .solo-notice {
      font-size: 0.8rem;
      color: #6b7280;
      font-style: italic;
      margin-top: 8px;
    }

    .warning {
      background: #fef9c3;
      border: 1px solid #fde047;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #713f12;
      margin-top: 8px;
    }

    .empty-state {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 24px 0;
    }
  </style>
</head>
<body>

<header>
  <span>🥒</span>
  <h1>Pickleball Randomizer</h1>
</header>

<div class="container">

  <!-- Settings -->
  <div class="card">
    <h2>⚙️ Settings</h2>

    <div class="setting-row">
      <label>Number of Games</label>
      <input type="number" id="num-games" min="1" max="20" value="3" />
    </div>

    <div class="setting-row">
      <label>Players per Team</label>
      <input type="number" id="players-per-team" min="1" max="4" value="2" />
    </div>

    <div class="setting-row">
      <label>Courts Available</label>
      <input type="number" id="num-courts" min="1" max="8" value="1" />
    </div>
  </div>

  <!-- Players -->
  <div class="card">
    <h2>👥 Players</h2>

    <div class="player-input-row">
      <input type="text" id="player-name" placeholder="Enter player name…" maxlength="40" />
      <button class="btn btn-green" onclick="addPlayer()">Add</button>
    </div>

    <div class="player-count">
      <span id="player-count-num">0</span> players added
      &nbsp;·&nbsp; need at least <span id="min-players">4</span>
    </div>

    <ul id="player-list">
      <li class="empty-state" id="empty-msg">No players yet — add some above!</li>
    </ul>

    <div style="margin-top:10px; display:flex; gap:8px;">
      <button class="btn btn-gray" style="font-size:0.78rem;" onclick="clearPlayers()">Clear All</button>
      <button class="btn btn-gray" style="font-size:0.78rem;" onclick="loadSample()">Load Sample</button>
    </div>
  </div>

  <!-- Action -->
  <div class="action-bar">
    <button class="btn btn-green" onclick="randomize()">🎲 Randomize Teams</button>
    <button class="btn btn-yellow" onclick="rerandomize()" id="rerand-btn" style="display:none;">🔀 Re-randomize</button>
  </div>

  <!-- Results -->
  <div class="results-section card" id="results-container">
    <h2>🏆 Games</h2>
    <div id="results"></div>
  </div>

</div>

<script>
  let players = [];

  const playerNameInput = document.getElementById('player-name');
  const playerList = document.getElementById('player-list');
  const emptyMsg = document.getElementById('empty-msg');
  const playerCountNum = document.getElementById('player-count-num');
  const minPlayersSpan = document.getElementById('min-players');
  const resultsContainer = document.getElementById('results-container');
  const resultsDiv = document.getElementById('results');
  const rerandBtn = document.getElementById('rerand-btn');

  const numGamesInput = document.getElementById('num-games');
  const playersPerTeamInput = document.getElementById('players-per-team');
  const numCourtsInput = document.getElementById('num-courts');

  // Update min players display when settings change
  [playersPerTeamInput, numCourtsInput].forEach(el => {
    el.addEventListener('input', updateMinPlayers);
  });

  function updateMinPlayers() {
    const ppt = parseInt(playersPerTeamInput.value) || 2;
    const courts = parseInt(numCourtsInput.value) || 1;
    minPlayersSpan.textContent = ppt * 2 * courts;
  }
  updateMinPlayers();

  playerNameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer();
  });

  function addPlayer() {
    const name = playerNameInput.value.trim();
    if (!name) return;
    if (players.includes(name)) {
      alert(`"${name}" is already on the list.`);
      return;
    }
    players.push(name);
    playerNameInput.value = '';
    playerNameInput.focus();
    renderPlayers();
  }

  function removePlayer(name) {
    players = players.filter(p => p !== name);
    renderPlayers();
  }

  function renderPlayers() {
    playerCountNum.textContent = players.length;
    if (players.length === 0) {
      playerList.innerHTML = '<li class="empty-state" id="empty-msg">No players yet — add some above!</li>';
      return;
    }
    playerList.innerHTML = players.map(p =>
      `<li><span>${p}</span><button class="btn btn-red" onclick="removePlayer('${escHtml(p)}')">✕</button></li>`
    ).join('');
  }

  function escHtml(str) {
    return str.replace(/'/g, "\\'");
  }

  function clearPlayers() {
    if (players.length && !confirm('Clear all players?')) return;
    players = [];
    renderPlayers();
    hideResults();
  }

  function loadSample() {
    players = ['Alice','Bob','Carol','Dave','Eve','Frank','Grace','Hank'];
    renderPlayers();
    hideResults();
  }

  function hideResults() {
    resultsContainer.style.display = 'none';
    rerandBtn.style.display = 'none';
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function randomize() {
    const ppt = parseInt(playersPerTeamInput.value) || 2;
    const courts = parseInt(numCourtsInput.value) || 1;
    const numGames = parseInt(numGamesInput.value) || 3;
    const playersPerCourt = ppt * 2;
    const minNeeded = playersPerCourt * courts;

    if (players.length < 4) {
      alert('Please add at least 4 players.');
      return;
    }

    if (players.length < minNeeded) {
      if (!confirm(`You have ${players.length} players but ${minNeeded} are needed to fill ${courts} court(s). Some courts may be partial or empty. Continue?`)) return;
    }

    let html = '';

    for (let g = 1; g <= numGames; g++) {
      const shuffled = shuffle(players);
      html += `<div class="game-block"><h3>Game ${g}</h3><div class="courts-grid">`;

      let idx = 0;
      for (let c = 1; c <= courts; c++) {
        const courtPlayers = shuffled.slice(idx, idx + playersPerCourt);
        idx += playersPerCourt;
        if (courtPlayers.length < 2) break;

        const half = Math.ceil(courtPlayers.length / 2);
        const teamA = courtPlayers.slice(0, half);
        const teamB = courtPlayers.slice(half);

        html += `<div class="court-card">
          <div class="court-title">Court ${c}</div>
          <div class="team">
            <div class="team-label">Team A</div>
            <div class="team-players">${teamA.map(p => `<div>🟢 ${p}</div>`).join('')}</div>
          </div>
          <div class="team">
            <div class="team-label">Team B</div>
            <div class="team-players">${teamB.map(p => `<div>🔵 ${p}</div>`).join('')}</div>
          </div>
        </div>`;
      }

      // Sitting out
      const sitting = shuffled.slice(idx);
      if (sitting.length > 0) {
        html += `<div class="court-card">
          <div class="court-title" style="background:#fef9c3;color:#713f12;">Sitting Out</div>
          <div class="team">
            <div class="team-players">${sitting.map(p => `<div>⏸️ ${p}</div>`).join('')}</div>
          </div>
        </div>`;
      }

      html += `</div></div>`;
    }

    resultsDiv.innerHTML = html;
    resultsContainer.style.display = 'block';
    rerandBtn.style.display = 'inline-block';
    resultsContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function rerandomize() {
    randomize();
  }
</script>

</body>
</html>
